<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Preview — Kolb Park</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      border: 6px solid #333;
      overflow: hidden;
      position: relative;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #333;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }
    .status-bar {
      height: 54px;
      background: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      font-size: 14px;
      font-weight: 600;
      z-index: 5;
      position: relative;
    }
    .status-bar .time { margin-left: 4px; }
    .status-bar .icons { display: flex; gap: 6px; font-size: 12px; }
    iframe {
      width: 100%;
      height: calc(100% - 54px);
      border: none;
    }
    h1 {
      color: #888;
      font-size: 14px;
      font-weight: 400;
      margin-top: 20px;
      text-align: center;
    }
    .fullscreen-note {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="phone-frame">
      <div class="status-bar">
        <span class="time" id="clock"></span>
        <span class="icons">&#9679; &#9679; &#9679;</span>
      </div>
      <iframe src="https://www.indian-rocks-beach.com/parks_trails/kolb-park"
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
              loading="eager"></iframe>
    </div>
    <h1>Kolb Park — App Preview</h1>
    <p class="fullscreen-note">This simulates how the app renders on device.<br>No URL bar. No browser controls. Just your site.</p>
  </div>
  <script>
    function updateClock() {
      var d = new Date();
      var h = d.getHours();
      var m = d.getMinutes().toString().padStart(2, '0');
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
